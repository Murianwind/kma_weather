[pytest]
# custom_components 모듈 경로 추가
pythonpath = .

# asyncio 설정
asyncio_default_fixture_loop_scope = function
asyncio_mode = auto

# 병렬 실행 및 출력 최적화
addopts =
    --no-header
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    --durations=10
    --cov-branch

# 커스텀 마커 등록
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
