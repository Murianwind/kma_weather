name: Pytest

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-freezegun \
                      pytest-homeassistant-custom-component

          if [ -f custom_components/kma_weather/manifest.json ]; then
            REQ_LIST=$(jq -r '.requirements[]?' custom_components/kma_weather/manifest.json)
            if [ -n "$REQ_LIST" ]; then
              pip install $REQ_LIST
            fi
          fi

      - name: Run Pytest
        run: pytest tests/ --no-header -v --disable-warnings

      - name: Publish Test Summary
        if: always()
        run: |
          echo "### ✅ Pytest Execution Report" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          pytest tests/ --no-header -q 2>&1 | grep "tests/test_" || true >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
