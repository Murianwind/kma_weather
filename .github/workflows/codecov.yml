name: Codecov

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-freezegun \
                      pytest-homeassistant-custom-component \
                      coverage pytest-cov

          if [ -f custom_components/kma_weather/manifest.json ]; then
            REQ_LIST=$(jq -r '.requirements[]?' custom_components/kma_weather/manifest.json)
            if [ -n "$REQ_LIST" ]; then
              pip install $REQ_LIST
            fi
          fi

      - name: Run Pytest with Coverage
        run: |
          # --cov-branch 옵션을 추가하여 분기 커버리지 측정 활성화
          pytest tests/ \
            --cov=custom_components.kma_weather \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml \
            --no-header -v \
            --tb=short \
            --color=yes \
            --durations=10 | tee pytest-coverage.txt

      - name: Generate Detailed Coverage Summary
        if: always()
        run: |
          echo "### 📊 Coverage Report — 파일별 상세" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          # 표 헤더 수정 (분기 커버리지 포함)
          echo "파일 경로                                     실행가능  누락  분기  커버리지(%)  누락 라인" >> $GITHUB_STEP_SUMMARY
          echo "─────────────────────────────────────────────────────────────────────────────────────────────" >> $GITHUB_STEP_SUMMARY
          
          # term-missing 출력에서 데이터 추출 및 포맷팅
          # $2: Stmts(실행가능), $3: Miss(누락), $4: Branch(전체분기), $6: Cover(%), $7: Missing(라인)
          grep -E "^custom_components" pytest-coverage.txt | \
            awk '{printf "%-45s %8s %5s %5s %11s   %s\n", $1, $2, $3, $4, $6, $7}' \
            >> $GITHUB_STEP_SUMMARY
          
          echo "─────────────────────────────────────────────────────────────────────────────────────────────" >> $GITHUB_STEP_SUMMARY
          
          # TOTAL 행 처리
          grep -E "^TOTAL" pytest-coverage.txt | \
            awk '{printf "%-45s %8s %5s %5s %11s\n", "TOTAL", $2, $3, $4, $6}' \
            >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Generate Coverage Summary
        if: always()
        run: |
          # TOTAL 라인에서 구문과 분기 데이터 추출하여 개별 % 계산
          # pytest-cov 출력 형식: Name Stmts Miss Branch BrPart Cover Missing
          TOTAL_LINE=$(grep "^TOTAL" pytest-coverage.txt)
          STMTS=$(echo $TOTAL_LINE | awk '{print $2}')
          MISS=$(echo $TOTAL_LINE | awk '{print $3}')
          BRANCH=$(echo $TOTAL_LINE | awk '{print $4}')
          BR_MISS=$(echo $TOTAL_LINE | awk '{print $5}')
          COMBINED=$(echo $TOTAL_LINE | awk '{print $6}')

          # 구문 커버리지 % 계산
          STMT_PER=$(awk "BEGIN {if ($STMTS > 0) printf \"%.2f\", (($STMTS - $MISS) / $STMTS) * 100; else print \"0.00\"}")
          # 분기 커버리지 % 계산
          BRANCH_PER=$(awk "BEGIN {if ($BRANCH > 0) printf \"%.2f\", (($BRANCH - $BR_MISS) / $BRANCH) * 100; else print \"0.00\"}")

          echo "### 📈 커버리지 지표 요약" >> $GITHUB_STEP_SUMMARY
          echo "| 측정 지표 | 커버리지율 | 상세 수치 |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **구문(Statement)** | **${STMT_PER}%** | $(($STMTS - $MISS)) / $STMTS |" >> $GITHUB_STEP_SUMMARY
          echo "| **분기(Branch)** | **${BRANCH_PER}%** | $(($BRANCH - $BR_MISS)) / $BRANCH |" >> $GITHUB_STEP_SUMMARY
          echo "| **통합(Combined)** | **${COMBINED}** | (Stmts + Branch 합산) |" >> $GITHUB_STEP_SUMMARY

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: true
          verbose: true
