name: Codecov

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-freezegun \
                      pytest-homeassistant-custom-component \
                      coverage pytest-cov

          if [ -f custom_components/kma_weather/manifest.json ]; then
            REQ_LIST=$(jq -r '.requirements[]?' custom_components/kma_weather/manifest.json)
            if [ -n "$REQ_LIST" ]; then
              pip install $REQ_LIST
            fi
          fi

      - name: Run Pytest with Coverage
        run: |
          pytest tests/ \
            --cov=custom_components.kma_weather \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=term \
            --no-header -v \
            --tb=short \
            --color=yes \
            --durations=10 | tee pytest-coverage.txt

      - name: Generate Detailed Coverage Summary
        if: always()
        run: |
          echo "### 📊 Coverage Report — 파일별 상세" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          echo "파일                                          Stmts   Miss  Cover   누락 라인" >> $GITHUB_STEP_SUMMARY
          echo "─────────────────────────────────────────────────────────────────────────────" >> $GITHUB_STEP_SUMMARY
          # term-missing 출력에서 파일별 행 추출 (헤더/구분선/TOTAL 제외)
          grep -E "^custom_components" pytest-coverage.txt | \
            sed 's/,[[:space:]]*$//' | \
            awk '{printf "%-45s %6s %6s %6s   %s\n", $1, $2, $3, $4, $5}' \
            >> $GITHUB_STEP_SUMMARY
          echo "─────────────────────────────────────────────────────────────────────────────" >> $GITHUB_STEP_SUMMARY
          grep -E "^TOTAL" pytest-coverage.txt | \
            awk '{printf "%-45s %6s %6s %6s\n", "TOTAL", $2, $3, $4}' \
            >> $GITHUB_STEP_SUMMARY || echo "No TOTAL data." >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      - name: Generate Coverage Summary
        run: |
          TOTAL=$(grep "^TOTAL" pytest-coverage.txt | awk '{print $4}')
          echo "### 📊 커버리지 요약" >> $GITHUB_STEP_SUMMARY
          echo "| 측정 방식 | 커버리지 |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 구문(Statement) | **${TOTAL}** |" >> $GITHUB_STEP_SUMMARY
          
      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: true
          verbose: true
