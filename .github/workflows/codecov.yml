name: Codecov

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-freezegun \
                      pytest-homeassistant-custom-component \
                      coverage pytest-cov

          if [ -f custom_components/kma_weather/manifest.json ]; then
            REQ_LIST=$(jq -r '.requirements[]?' custom_components/kma_weather/manifest.json)
            if [ -n "$REQ_LIST" ]; then
              pip install $REQ_LIST
            fi
          fi

      - name: Run Pytest with Coverage
        run: |
          # 분기 커버리지까지 포함하여 텍스트 리포트 생성
          pytest tests/ \
            --cov=custom_components.kma_weather \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml \
            --no-header -v \
            --tb=short \
            --color=yes \
            --durations=10 | tee pytest-coverage.txt

      - name: Generate Detailed Coverage Summary
        if: always()
        run: |
          echo "### 📊 Coverage Report — 파일별 상세 지표" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 파일 경로 | 실행 가능(Stmts) | 누락(Miss) | 분기(Branch) | 커버리지(%) | 누락 라인 |" >> $GITHUB_STEP_SUMMARY
          echo "|:---|---:|---:|---:|---:|:---|" >> $GITHUB_STEP_SUMMARY
          
          # pytest-cov의 출력 컬럼: Name(1) Stmts(2) Miss(3) Branch(4) BrPart(5) Cover(6) Missing(7)
          grep -E "^custom_components" pytest-coverage.txt | while read -r line; do
            NAME=$(echo $line | awk '{print $1}')
            STMTS=$(echo $line | awk '{print $2}')
            MISS=$(echo $line | awk '{print $3}')
            BRANCH=$(echo $line | awk '{print $4}')
            COVER=$(echo $line | awk '{print $6}')
            MISSING_LINES=$(echo $line | awk '{print $7}')
            
            # 표의 한 줄 생성
            echo "| $NAME | $STMTS | $MISS | $BRANCH | **$COVER** | $MISSING_LINES |" >> $GITHUB_STEP_SUMMARY
          done
          
          # TOTAL 행 처리
          TOTAL_LINE=$(grep "^TOTAL" pytest-coverage.txt)
          T_STMTS=$(echo $TOTAL_LINE | awk '{print $2}')
          T_MISS=$(echo $TOTAL_LINE | awk '{print $3}')
          T_BRANCH=$(echo $TOTAL_LINE | awk '{print $4}')
          T_COVER=$(echo $TOTAL_LINE | awk '{print $6}')
          
          echo "| **합계(TOTAL)** | **$T_STMTS** | **$T_MISS** | **$T_BRANCH** | **$T_COVER** | - |" >> $GITHUB_STEP_SUMMARY

      - name: Generate Coverage Summary (%)
        if: always()
        run: |
          # TOTAL 데이터 정밀 계산
          TOTAL_LINE=$(grep "^TOTAL" pytest-coverage.txt)
          STMTS=$(echo $TOTAL_LINE | awk '{print $2}')
          MISS=$(echo $TOTAL_LINE | awk '{print $3}')
          BRANCH=$(echo $TOTAL_LINE | awk '{print $4}')
          BR_MISS=$(echo $TOTAL_LINE | awk '{print $5}')

          # 소수점 2자리까지 % 계산 (awk 활용)
          STMT_PER=$(awk "BEGIN {if ($STMTS > 0) printf \"%.2f\", (($STMTS - $MISS) / $STMTS) * 100; else print \"0.00\"}")
          BRANCH_PER=$(awk "BEGIN {if ($BRANCH > 0) printf \"%.2f\", (($BRANCH - $BR_MISS) / $BRANCH) * 100; else print \"0.00\"}")

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📈 커버리지 지표 요약" >> $GITHUB_STEP_SUMMARY
          echo "| 측정 방식 | 커버리지율(%) | 상세 수치 (성공/전체) |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **구문 커버리지 (Statement)** | **${STMT_PER}%** | $(($STMTS - $MISS)) / $STMTS |" >> $GITHUB_STEP_SUMMARY
          echo "| **분기 커버리지 (Branch)** | **${BRANCH_PER}%** | $(($BRANCH - $BR_MISS)) / $BRANCH |" >> $GITHUB_STEP_SUMMARY

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: true
          verbose: true
